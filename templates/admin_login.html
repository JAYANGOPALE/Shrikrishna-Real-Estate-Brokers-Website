{% extends "base.html" %}

{% block title %}Admin Login - Shrikrishna Real Estate{% endblock %}

{% block content %}
<div class="min-h-[70vh] flex flex-col justify-center py-12 sm:px-6 lg:px-8 bg-gray-50">
    <div class="sm:mx-auto sm:w-full sm:max-w-md text-center">
        <div class="flex justify-center mb-4">
            <div class="p-3 rounded-full bg-purple-100 text-purple-600">
                <i class="fas fa-user-shield text-3xl"></i>
            </div>
        </div>
        <h2 class="text-center text-3xl font-extrabold text-gray-900">
            Admin Login
        </h2>
        <p class="mt-2 text-center text-sm text-gray-600">
            Secure dashboard access
        </p>
    </div>

    <div class="mt-8 sm:mx-auto sm:w-full sm:max-w-md">
        <div class="bg-white py-8 px-4 shadow sm:rounded-lg sm:px-10">
            <form class="space-y-6" action="{{ url_for('auth.admin_login') }}" method="POST">
                <div>
                    <label for="email" class="block text-sm font-medium text-gray-700">
                        Admin Email
                    </label>
                    <div class="mt-1">
                        <input id="email" name="email" type="email" required class="appearance-none block w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-purple-500 focus:border-purple-500 sm:text-sm">
                    </div>
                </div>

                <div>
                    <label for="password" class="block text-sm font-medium text-gray-700">
                        Password
                    </label>
                    <div class="mt-1">
                        <input id="password" name="password" type="password" required class="appearance-none block w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-purple-500 focus:border-purple-500 sm:text-sm">
                    </div>
                </div>

                <div>
                    <button type="submit" class="w-full flex justify-center py-2 px-4 border border-transparent rounded-md shadow-sm text-sm font-medium text-white bg-purple-600 hover:bg-purple-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-purple-500 transition-all">
                        Secure Access
                    </button>
                </div>
            </form>
            <div class="mt-6 text-center border-t pt-6">
                <p class="text-sm text-gray-600">
                    Not an admin? <a href="{{ url_for('auth.login') }}" class="font-medium text-blue-600 hover:text-blue-500">Go to User Login</a>
                </p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
