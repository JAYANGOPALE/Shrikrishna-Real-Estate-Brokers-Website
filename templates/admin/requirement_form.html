{% extends "base.html" %}

{% block title %}{{ action }} Requirement - Shrikrishna Real Estate{% endblock %}

{% block content %}
<div class="max-w-2xl mx-auto px-4 py-10">
    <div class="bg-white shadow rounded-lg p-8">
        <h1 class="text-2xl font-bold text-gray-900 mb-6">{{ action }} Customer Requirement</h1>
        
        <form action="{{ url_for('admin.add_requirement') }}" method="POST">
            <div class="space-y-6">
                <div>
                    <label class="block text-sm font-medium text-gray-700">Requirement Title</label>
                    <input type="text" name="title" required placeholder="e.g. 2BHK under 40 lakh" class="mt-1 block w-full border border-gray-300 rounded-md shadow-sm p-2 focus:ring-blue-500 focus:border-blue-500">
                </div>

                <div>
                    <label class="block text-sm font-medium text-gray-700">Budget Range</label>
                    <input type="text" name="budget" required placeholder="e.g. 35L - 45L" class="mt-1 block w-full border border-gray-300 rounded-md shadow-sm p-2">
                </div>

                <div>
                    <label class="block text-sm font-medium text-gray-700">Preferred Location (Nashik)</label>
                    <input type="text" name="location" value="Nashik" readonly class="mt-1 block w-full bg-gray-50 border border-gray-300 rounded-md shadow-sm p-2 cursor-not-allowed">
                </div>

                <div>
                    <label class="block text-sm font-medium text-gray-700">Additional Details</label>
                    <textarea name="description" rows="4" placeholder="e.g. Specific area in Nashik, floor preference, etc." class="mt-1 block w-full border border-gray-300 rounded-md shadow-sm p-2"></textarea>
                </div>
            </div>

            <div class="mt-8 flex justify-end space-x-4">
                <a href="{{ url_for('admin.dashboard') }}" class="px-4 py-2 text-sm font-medium text-gray-700 bg-gray-100 rounded-md hover:bg-gray-200">Cancel</a>
                <button type="submit" class="px-4 py-2 text-sm font-medium text-white bg-blue-600 rounded-md hover:bg-blue-700">Post Requirement</button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
