{% extends "base.html" %}

{% block title %}{{ action }} Property - Shrikrishna Real Estate{% endblock %}

{% block content %}
<div class="max-w-4xl mx-auto px-4 py-10">
    <div class="bg-white shadow rounded-lg p-8">
        <h1 class="text-2xl font-bold text-gray-900 mb-6">{{ action }} Property Listing</h1>
        
        <form action="{{ url_for('admin.edit_property', id=prop.property_id) if action == 'Edit' else url_for('admin.add_property') }}" method="POST" enctype="multipart/form-data">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div class="md:col-span-2">
                    <label class="block text-sm font-medium text-gray-700">Property Title</label>
                    <input type="text" name="title" value="{{ prop.title if prop else '' }}" required class="mt-1 block w-full border border-gray-300 rounded-md shadow-sm p-2 focus:ring-blue-500 focus:border-blue-500">
                </div>

                <div>
                    <label class="block text-sm font-medium text-gray-700">Price (₹)</label>
                    <input type="number" name="price" value="{{ prop.price if prop else '' }}" required class="mt-1 block w-full border border-gray-300 rounded-md shadow-sm p-2">
                </div>

                <div>
                    <label class="block text-sm font-medium text-gray-700">Location (Nashik)</label>
                    <input type="text" name="location" value="{{ prop.location if prop else 'Nashik' }}" readonly class="mt-1 block w-full bg-gray-50 border border-gray-300 rounded-md shadow-sm p-2 cursor-not-allowed">
                </div>

                <div>
                    <label class="block text-sm font-medium text-gray-700">BHK</label>
                    <input type="number" name="bhk" value="{{ prop.bhk if prop else '2' }}" required class="mt-1 block w-full border border-gray-300 rounded-md shadow-sm p-2">
                </div>

                <div>
                    <label class="block text-sm font-medium text-gray-700">Area (sqft)</label>
                    <input type="number" name="area" value="{{ prop.area if prop else '' }}" required class="mt-1 block w-full border border-gray-300 rounded-md shadow-sm p-2">
                </div>

                <div>
                    <label class="block text-sm font-medium text-gray-700">Listing Type</label>
                    <select name="listing_type" class="mt-1 block w-full border border-gray-300 rounded-md shadow-sm p-2">
                        <option value="Sale" {% if prop and prop.listing_type == 'Sale' %}selected{% endif %}>For Sale</option>
                        <option value="Rent" {% if prop and prop.listing_type == 'Rent' %}selected{% endif %}>For Rent</option>
                    </select>
                </div>

                <div>
                    <label class="block text-sm font-medium text-gray-700">Property Type</label>
                    <select name="property_type" class="mt-1 block w-full border border-gray-300 rounded-md shadow-sm p-2">
                        <option value="Apartment" {% if prop and prop.property_type == 'Apartment' %}selected{% endif %}>Apartment</option>
                        <option value="Villa" {% if prop and prop.property_type == 'Villa' %}selected{% endif %}>Villa</option>
                        <option value="Plot" {% if prop and prop.property_type == 'Plot' %}selected{% endif %}>Plot</option>
                        <option value="Shop" {% if prop and prop.property_type == 'Shop' %}selected{% endif %}>Shop/Commercial</option>
                    </select>
                </div>

                <div class="md:col-span-2">
                    <label class="block text-sm font-medium text-gray-700">Description</label>
                    <textarea name="description" rows="4" class="mt-1 block w-full border border-gray-300 rounded-md shadow-sm p-2">{{ prop.description if prop else '' }}</textarea>
                </div>

                <div class="md:col-span-2">
                    <div class="flex items-center">
                        <input type="checkbox" name="is_featured" value="1" {% if prop and prop.is_featured %}checked{% endif %} class="h-4 w-4 text-blue-600 border-gray-300 rounded">
                        <label class="ml-2 block text-sm text-gray-900 font-bold">Show as Featured Property on Homepage</label>
                    </div>
                </div>

                <div class="md:col-span-2">
                    <label class="block text-sm font-medium text-gray-700">Upload Images (Multiple)</label>
                    <input type="file" name="images" multiple accept="image/*" class="mt-1 block w-full text-sm text-gray-500 file:mr-4 file:py-2 file:px-4 file:rounded-md file:border-0 file:text-sm file:font-semibold file:bg-blue-50 file:text-blue-700 hover:file:bg-blue-100">
                </div>
            </div>

            <div class="mt-8 flex justify-end space-x-4">
                <a href="{{ url_for('admin.dashboard') }}" class="px-4 py-2 text-sm font-medium text-gray-700 bg-gray-100 rounded-md hover:bg-gray-200">Cancel</a>
                <button type="submit" class="px-4 py-2 text-sm font-medium text-white bg-blue-600 rounded-md hover:bg-blue-700">Save Property</button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
